services:
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    image: structured-output-creator-devcontainer
    user: dev
    volumes:
      - ..:/workspace:cached
      - claude-config:/home/dev/.claude
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      - SSH_AUTH_SOCK=/ssh-agent
    command: sleep infinity

volumes:
  claude-config:
